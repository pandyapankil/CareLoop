{% extends "base.html" %}
{% block title %}Upload Document — {{ patient.name }} — CareLoop{% endblock %}

{% block content %}
<div class="page-header">
    <a href="/patient/{{ patient.id }}/documents" class="back-link">← Back to Documents</a>
    <h1 class="page-title">Upload Document</h1>
    <p class="page-subtitle">Upload a document for {{ patient.name }}</p>
</div>

<div class="form-card">
    <form action="/patient/{{ patient.id }}/documents/upload" method="POST" enctype="multipart/form-data" id="upload-form">
        <div class="form-group">
            <label for="file" class="form-label">Select File</label>
            <input type="file" id="file" name="file" class="form-input"
                accept=".pdf,.jpg,.jpeg,.png,.doc,.docx" required>
            <small style="color: var(--text-muted);">Allowed: .pdf, .jpg, .jpeg, .png, .doc, .docx (max 10MB)</small>
        </div>

        <div class="form-group">
            <label for="category" class="form-label">Category</label>
            <select id="category" name="category" class="form-select" required>
                {% for val, label in categories %}
                <option value="{{ val }}">{{ label }}</option>
                {% endfor %}
            </select>
        </div>

        <div class="form-group">
            <label for="description" class="form-label">Description</label>
            <textarea id="description" name="description" class="form-textarea"
                placeholder="Optional description of the document..."
                rows="3"></textarea>
        </div>

        <div class="form-actions">
            <button type="submit" class="btn btn-primary">Upload</button>
            <a href="/patient/{{ patient.id }}/documents" class="btn btn-outline">Cancel</a>
        </div>
    </form>
</div>
{% endblock %}
