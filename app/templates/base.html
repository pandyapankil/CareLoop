<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="CareLoop — AI-powered care coordination using GLM 5.1">
    <title>{% block title %}CareLoop{% endblock %}</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Outfit:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <nav class="navbar">
        <div class="nav-container">
            <a href="/" class="nav-brand">
                <span class="brand-icon">⟳</span>
                <span class="brand-text">CareLoop</span>
            </a>
            <div class="nav-status">
                {% if glm_available %}
                <span class="status-badge status-online" id="glm-status">GLM 5.1 Connected</span>
                {% else %}
                <span class="status-badge status-offline" id="glm-status">GLM 5.1 Demo Mode</span>
                {% endif %}
            </div>
        </div>
    </nav>

    <main class="main-content">
        <div class="container">
            {% block content %}{% endblock %}
        </div>
    </main>

    <footer class="footer">
        <div class="container">
            <p>CareLoop — AI that closes the care coordination gap &middot; Powered by <strong>GLM 5.1</strong></p>
        </div>
    </footer>

    {% block scripts %}{% endblock %}
</body>
</html>
