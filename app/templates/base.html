<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="CareLoop — AI-powered care coordination using GLM 5.1">
    <title>{% block title %}CareLoop{% endblock %}</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Outfit:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <nav class="navbar">
        <div class="nav-container">
            <a href="/" class="nav-brand">
                <span class="brand-icon">⟳</span>
                <span class="brand-text">CareLoop</span>
            </a>
            <div class="nav-status">
                <span class="glm-thinking-badge" id="glm-thinking-badge" style="display:none">
                    <span class="glmthinking-dot"></span>
                    <span class="glmthinking-dot"></span>
                    <span class="glmthinking-dot"></span>
                    GLM 5.1 Thinking
                </span>
                {% if glm_available %}
                <span class="status-badge status-online" id="glm-status">GLM 5.1 Connected</span>
                {% else %}
                <span class="status-badge status-offline" id="glm-status">GLM 5.1 Demo Mode</span>
                {% endif %}
            </div>
        </div>
    </nav>

    <main class="main-content">
        <div class="container">
            {% block content %}{% endblock %}
        </div>
    </main>

    <footer class="footer">
        <div class="container">
            <p>CareLoop — AI that closes the care coordination gap &middot; Powered by <strong>GLM 5.1</strong></p>
        </div>
    </footer>

    <script>
    // Think status animation
    const thinkIndicator = document.createElement('div');
    thinkIndicator.id = 'thinking-indicator';
    thinkIndicator.innerHTML = '<span class="think-dot"></span><span class="think-dot"></span><span class="think-dot"></span>';
    thinkIndicator.className = 'thinking';
    thinkIndicator.style.display = 'none';
    
    const glmThinkingBadge = document.getElementById('glm-thinking-badge');
    window.isThinking = false;
    
    function showThinkingBadge() {
        if (glmThinkingBadge) {
            glmThinkingBadge.style.display = 'flex';
        }
    }
    
    function hideThinkingBadge() {
        if (glmThinkingBadge) {
            glmThinkingBadge.style.display = 'none';
        }
    }
    
    // SSE for streaming responses
    async function streamAnalysis(patientId, outputEl) {
        window.isThinking = true;
        window.tasksCreatedCount = 0;
        showThinkingBadge();
        outputEl.innerHTML = '';
        outputEl.appendChild(thinkIndicator.cloneNode(true));
        outputEl.querySelector('#thinking-indicator').style.display = 'flex';
        
        const evtSource = new EventSource(`/api/stream/analyze/${patientId}`);
        let thinking = '';
        let content = '';
        
        evtSource.onmessage = (e) => {
            const data = JSON.parse(e.data);
            if (data.event === 'thinking') {
                thinking += data.content;
                outputEl.querySelector('#thinking-indicator').title = 'GLM is thinking...';
                const thinkingEl = document.getElementById('glm-reasoning-text');
                if (thinkingEl) {
                    thinkingEl.textContent = thinking;
                }
            } else if (data.event === 'content') {
                content += data.content;
                outputEl.innerHTML = content;
            } else if (data.event === 'tool_call') {
                const toolName = data.tool_name;
                const toolArgs = data.tool_args;
                if (toolName === 'create_task') {
                    const taskTitle = toolArgs.title || 'New task';
                    window.tasksCreatedCount = (window.tasksCreatedCount || 0) + 1;
                    showToast(`🤖 Creating task: ${taskTitle}...`, 'thinking');
                }
            } else if (data.event === 'tool_result') {
                if (data.tool_name === 'create_task') {
                    showToast(`✅ Task created!`, 'success');
                }
            } else if (data.event === 'done') {
                evtSource.close();
                window.isThinking = false;
                hideThinkingBadge();
                outputEl.querySelector('#thinking-indicator').style.display = 'none';
                const taskCount = window.tasksCreatedCount || 0;
                if (taskCount > 0) {
                    showToast(`🎉 Analysis complete! ${taskCount} task${taskCount > 1 ? 's' : ''} created.`, 'success');
                }
            }
        };
        
        evtSource.onerror = () => {
            evtSource.close();
            window.isThinking = false;
            hideThinkingBadge();
        };
    }
    
    // Toast notification system
    function showToast(message, type = 'thinking') {
        let container = document.getElementById('toast-container');
        if (!container) {
            container = document.createElement('div');
            container.id = 'toast-container';
            container.className = 'toast-container';
            document.body.appendChild(container);
        }
        
        const toast = document.createElement('div');
        toast.className = `toast toast-${type}`;
        toast.innerHTML = message;
        
        container.appendChild(toast);
        
        setTimeout(() => {
            toast.classList.add('toast-show');
        }, 10);
        
        setTimeout(() => {
            toast.classList.remove('toast-show');
            setTimeout(() => toast.remove(), 300);
        }, 3000);
    }
    
    // Show thinking on analyze button click
    document.addEventListener('DOMContentLoaded', () => {
        document.querySelectorAll('form[action*="/analyze"]').forEach(form => {
            form.addEventListener('submit', function(e) {
                const patientId = form.action.match(/patient\/([^/]+)/)?.[1];
                const outputEl = document.getElementById('analysis-output');
                if (patientId && outputEl && window.EventSource) {
                    e.preventDefault();
                    streamAnalysis(patientId, outputEl);
                    fetch(form.action, {method: 'POST', redirect: 'follow'})
                        .then(resp => {
                            if (resp.redirected) {
                                window.location.href = resp.url;
                            } else if (resp.ok) {
                                window.location.reload();
                            }
                        })
                        .catch(() => window.location.reload());
                }
            });
        });
    });
    </script>
    
    <style>
    .thinking {
        display: flex;
        gap: 4px;
        padding: 12px;
        align-items: center;
    }
    .think-dot {
        width: 8px;
        height: 8px;
        background: #6366f1;
        border-radius: 50%;
        animation: think-pulse 1.4s infinite ease-in-out;
    }
    .think-dot:nth-child(2) { animation-delay: 0.2s; }
    .think-dot:nth-child(3) { animation-delay: 0.4s; }
    @keyframes think-pulse {
        0%, 80%, 100% { transform: scale(0.6); opacity: 0.5; }
        40% { transform: scale(1); opacity: 1; }
    }
    .glm-thinking-badge {
        display: flex;
        align-items: center;
        gap: 6px;
        padding: 6px 12px;
        background: linear-gradient(135deg, #6366f1, #8b5cf6);
        color: white;
        border-radius: 20px;
        font-size: 12px;
        font-weight: 600;
        animation: glmthinking-pulse 2s ease-in-out infinite;
    }
    .glmthinking-dot {
        width: 6px;
        height: 6px;
        background: white;
        border-radius: 50%;
        animation: think-pulse 1.4s infinite ease-in-out;
    }
    .glmthinking-dot:nth-child(2) { animation-delay: 0.2s; }
    .glmthinking-dot:nth-child(3) { animation-delay: 0.4s; }
    @keyframes glmthinking-pulse {
        0%, 100% { box-shadow: 0 0 0 0 rgba(99, 102, 241, 0.4); }
        50% { box-shadow: 0 0 0 8px rgba(99, 102, 241, 0); }
    }
    .toast-container {
        position: fixed;
        top: 80px;
        right: 20px;
        z-index: 10000;
        display: flex;
        flex-direction: column;
        gap: 10px;
    }
    .toast {
        padding: 14px 20px;
        border-radius: 8px;
        font-size: 14px;
        font-weight: 500;
        box-shadow: 0 4px 20px rgba(0,0,0,0.15);
        transform: translateX(120%);
        transition: transform 0.3s ease;
        max-width: 350px;
    }
    .toast-show {
        transform: translateX(0);
    }
    .toast-thinking {
        background: linear-gradient(135deg, #3b82f6, #6366f1);
        color: white;
    }
    .toast-success {
        background: linear-gradient(135deg, #10b981, #059669);
        color: white;
    }
    .toast-error {
        background: linear-gradient(135deg, #ef4444, #dc2626);
        color: white;
    }
    </style>

    {% block scripts %}{% endblock %}
    
    {% include "onboarding.html" %}
</body>
</html>
