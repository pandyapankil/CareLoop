<style>

    align-items: center;

    display: flex;
}

.onboarding-backdrop {
    position: absolute;
    inset: 0;

    backdrop-filter: blur(4px);
    animation: fadeIn 0.3s ease;
}

    position: relative;
    background: linear-gradient(145deg, #1e1b4b, #312e81);

    max-width: 480px;
    width: 90%;
    box-shadow: 
        0 25px 50px -12px rgba(0, 0, 0, 0.5),
        0 0 0 1px rgba(139, 92, 246, 0.3),
        inset 0 1px 0 rgba(255, 255, 255, 0.1);
    animation: slideUp 0.4s ease;
    color: white;
}

@keyframes fadeIn {
    from { opacity: 0; }
    to { opacity: 1; }
}

    from { opacity: 0; transform: translateY(20px) scale(0.98); }

}

    border-radius: 50%;

}

}

    text-align: center;

}

.onboarding-logo {
    display: inline-flex;

    height: 72px;

}

.logo-icon {
    font-size: 36px;
    color: white;
    animation: spin-slow 20s linear infinite;

.onboarding-title {
    font-family: 'Outfit', sans-serif;
    font-size: 28px;
    font-weight: 700;
    margin: 0 0 4px 0;
    background: linear-gradient(135deg, #fff, #c4b5fd);

}

    font-size: 16px;

    height: 8px;
    border-radius: 50%;

    transition: all 0.3s;

</style>

<script>
const tourSteps = [
    {
        title: "GLM 5.1 Analysis",
        description: "CareLoop uses advanced AI to analyze patient data, medical history, and care patterns. The AI thinks through complex scenarios to provide actionable insights."
    },
    {
        title: "Voice Q&A",
        description: "Communicate naturally with your care team. Ask questions, get instant answers, and receive personalized care guidance through voice interactions."
    },
    {
        title: "Real-time Insights",
        description: "Watch the AI reason in real-time. Every recommendation shows its thinking, so you understand exactly how conclusions are reached."
    },
    {
        title: "Ready to Go!",
        description: "You're all set! CareLoop streamlines care coordination so you can focus on what matters most — your patients."
    }
];

let currentTourStep = 0;

function closeOnboarding() {
    const modal = document.getElementById('onboarding-modal');
    if (modal) {
        modal.classList.remove('active');
        localStorage.setItem('onboarding_seen', 'true');
    }
}

function startTour() {
    closeOnboarding();
    const overlay = document.getElementById('tour-overlay');
    if (overlay) {
        overlay.classList.add('active');
        showTourStep(0);
    }
}

function showTourStep(step) {
    currentTourStep = step;
    const overlay = document.getElementById('tour-overlay');
    const stepEl = document.getElementById('tour-step-content');
    const dots = document.querySelectorAll('.tour-dot');
    
    if (stepEl && overlay) {
        const data = tourSteps[step];
        stepEl.innerHTML = `
            <div class="tour-dots">
                ${tourSteps.map((_, i) => `<span class="tour-dot ${i === step ? 'active' : ''}"></span>`).join('')}
            </div>
            <h2>${data.title}</h2>
            <p>${data.description}</p>
            <div class="tour-nav">
                ${step < tourSteps.length - 1 ? 
                    `<button class="tour-next" onclick="showTourStep(${step + 1})">Next</button>` : 
                    `<button class="tour-end" onclick="endTour()">Get Started</button>`
                }
                ${step > 0 ? `<button class="tour-end" onclick="showTourStep(${step - 1})">Back</button>` : ''}
            </div>
        `;
    }
}

function endTour() {
    const overlay = document.getElementById('tour-overlay');
    if (overlay) {
        overlay.classList.remove('active');
    }
    localStorage.setItem('onboarding_seen', 'true');
    localStorage.setItem('tour_completed', 'true');
}

document.addEventListener('DOMContentLoaded', () => {
    if (!localStorage.getItem('onboarding_seen')) {
        const modal = document.getElementById('onboarding-modal');
        if (modal) {
            modal.classList.add('active');
        }
    }
    
    const tourOverlay = document.createElement('div');
    tourOverlay.id = 'tour-overlay';
    tourOverlay.className = 'tour-overlay';
    tourOverlay.innerHTML = '<div id="tour-step-content" class="tour-step"></div>';
    document.body.appendChild(tourOverlay);
});
</script>
